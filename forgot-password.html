<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medchanic.md — Reset password</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a class="auth-back" href="/index.html">← Back to log in</a>
    <div class="auth-brand">
      <span class="mark">⚙</span>
      <span class="name">MEDCHANIC.MD</span>
    </div>
    <div class="auth-sub">Reset your password.</div>

    <div class="form-banner" id="banner"></div>

    <div id="step1">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@school.edu" autocomplete="email">
        <div class="field-error" id="emailError"></div>
      </div>
      <button class="btn-primary" id="resetBtn" onclick="handleReset()">Send reset email</button>
    </div>

    <div id="step2" style="display:none;">
      <p style="font-family:var(--serif);font-size:15px;line-height:1.6;color:var(--ink-soft);">
        Check your inbox — we've sent a password reset link to your email. Click the link in that
        email and you'll be brought back here to set your new password.
      </p>
      <div class="auth-foot" style="margin-top:20px;">
        <a href="/index.html">Back to log in</a>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { sendPasswordReset } from "/js/auth.js";

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function showBanner(msg, type) {
    const el = document.getElementById("banner");
    el.textContent = msg;
    el.className = `form-banner show ${type}`;
  }

  window.handleReset = async function() {
    const email = document.getElementById("email").value.trim();
    const btn = document.getElementById("resetBtn");
    const emailErr = document.getElementById("emailError");

    emailErr.classList.remove("show");
    document.getElementById("email").classList.remove("invalid");

    if (!EMAIL_RE.test(email)) {
      document.getElementById("email").classList.add("invalid");
      emailErr.textContent = "Enter a valid email address.";
      emailErr.classList.add("show");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Sending…";

    try {
      await sendPasswordReset(email);
      document.getElementById("step1").style.display = "none";
      document.getElementById("step2").style.display = "block";
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Send reset email";
      // We show the same success message even if email not found —
      // this is intentional security practice (don't reveal if email exists)
      document.getElementById("step1").style.display = "none";
      document.getElementById("step2").style.display = "block";
    }
  };

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") window.handleReset();
  });
</script>
</body>
</html>
