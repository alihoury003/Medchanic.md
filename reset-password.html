<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medchanic.md — Set new password</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="mark">⚙</span>
      <span class="name">MEDCHANIC.MD</span>
    </div>
    <div class="auth-sub" id="pageSubtitle">Set your new password.</div>

    <div class="form-banner" id="banner"></div>

    <div id="formArea">
      <div class="field">
        <label>New password</label>
        <input type="password" id="password" placeholder="At least 8 characters"
          autocomplete="new-password" oninput="checkStrength()">
        <div class="pw-strength" id="pwStrength"></div>
        <div class="field-error" id="passwordError"></div>
      </div>

      <div class="field">
        <label>Confirm new password</label>
        <input type="password" id="passwordConfirm" placeholder="••••••••" autocomplete="new-password">
        <div class="field-error" id="passwordConfirmError"></div>
      </div>

      <button class="btn-primary" id="confirmBtn" onclick="handleConfirm()">Set new password</button>
    </div>
  </div>
</div>

<script type="module">
  import { confirmPasswordReset } from "/js/auth.js";

  // Appwrite appends ?userId=...&secret=... to this page's URL
  const params = new URLSearchParams(window.location.search);
  const userId = params.get("userId");
  const secret = params.get("secret");

  if (!userId || !secret) {
    document.getElementById("pageSubtitle").textContent = "Invalid or expired reset link.";
    document.getElementById("formArea").style.display = "none";
    const b = document.getElementById("banner");
    b.textContent = "This link has expired or is invalid. Please request a new password reset.";
    b.className = "form-banner show error";
  }

  window.checkStrength = function() {
    const pw = document.getElementById("password").value;
    const el = document.getElementById("pwStrength");
    if (!pw) { el.textContent = ""; return; }
    if (pw.length < 8) {
      el.textContent = "Too short — minimum 8 characters.";
      el.style.color = "var(--incorrect)";
      return;
    }
    const strong = pw.length >= 12 && /[0-9]/.test(pw) && /[A-Za-z]/.test(pw);
    el.textContent = strong ? "Strong password ✓" : "Okay — try adding numbers or more characters.";
    el.style.color = strong ? "var(--correct)" : "var(--ink-faint)";
  };

  function showBanner(msg, type) {
    const el = document.getElementById("banner");
    el.textContent = msg;
    el.className = `form-banner show ${type}`;
  }

  window.handleConfirm = async function() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("passwordConfirm").value;
    const btn = document.getElementById("confirmBtn");

    document.querySelectorAll(".field-error").forEach(e => e.classList.remove("show"));
    document.querySelectorAll(".field input").forEach(e => e.classList.remove("invalid"));

    let hasError = false;
    if (password.length < 8) {
      document.getElementById("password").classList.add("invalid");
      const e = document.getElementById("passwordError");
      e.textContent = "Password must be at least 8 characters.";
      e.classList.add("show");
      hasError = true;
    }
    if (confirm !== password) {
      document.getElementById("passwordConfirm").classList.add("invalid");
      const e = document.getElementById("passwordConfirmError");
      e.textContent = "Passwords don't match.";
      e.classList.add("show");
      hasError = true;
    }
    if (hasError) return;

    btn.disabled = true;
    btn.textContent = "Saving…";

    try {
      await confirmPasswordReset(userId, secret, password);
      document.getElementById("formArea").style.display = "none";
      showBanner("Password updated! Redirecting you to log in…", "success");
      setTimeout(() => { window.location.href = "/index.html"; }, 2500);
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Set new password";
      showBanner("Something went wrong. This link may have expired — please request a new reset.", "error");
    }
  };
</script>
</body>
</html>
