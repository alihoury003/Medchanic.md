<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medchanic.md — Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dashboard-page { min-height: 100vh; background: var(--paper); }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: var(--ink);
      font-family: var(--mono);
    }
    .topbar .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--paper);
      font-weight: 700;
      font-size: 15px;
    }
    .topbar .brand .mark { color: var(--clinical-blue); }
    .topbar .user-area {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: var(--sans);
      font-size: 13px;
      color: #C9C7BD;
    }
    .btn-logout {
      background: transparent;
      border: 1px solid #3A3F49;
      color: #C9C7BD;
      font-family: var(--sans);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    .btn-logout:hover { border-color: var(--incorrect); color: var(--incorrect); }
    .dash-content {
      max-width: 780px;
      margin: 60px auto;
      padding: 0 28px;
      text-align: center;
    }
    .dash-content h1 { font-family: var(--serif); font-size: 30px; margin-bottom: 8px; }
    .dash-content h1 .accent { color: var(--clinical-blue); }
    .dash-content .sub { font-family: var(--sans); font-size: 15px; color: var(--ink-soft); margin-bottom: 40px; }
    .coming-soon {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 40px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink-faint);
    }
    .coming-soon .icon { font-size: 32px; margin-bottom: 12px; }
    .coming-soon p { line-height: 1.8; }
  </style>
</head>
<body>
<div class="dashboard-page">
  <div class="topbar">
    <div class="brand"><span class="mark">⚙</span>MEDCHANIC.MD</div>
    <div class="user-area">
      <span id="userGreeting">Loading…</span>
      <button class="btn-logout" onclick="handleLogout()">Log out</button>
    </div>
  </div>

  <div class="dash-content">
    <h1>Welcome back<span class="accent">.</span></h1>
    <p class="sub" id="dashSub">Loading your dashboard…</p>
    <div class="coming-soon">
      <div class="icon">⚙</div>
      <p>
        You're signed in and authenticated via Appwrite.<br><br>
        The full QBank dashboard — score ring, create test, previous tests, question blocks — is being connected to this account system now and will be live shortly.
      </p>
    </div>
  </div>
</div>

<script type="module">
  import { getCurrentUser, logOut } from "./auth.js";

  const user = await getCurrentUser();
  if (!user) {
    window.location.href = "index.html";
  } else {
    const firstName = user.name ? user.name.split(" ")[0] : user.email;
    document.getElementById("userGreeting").textContent = user.name || user.email;
    document.getElementById("dashSub").textContent = `Good to see you, ${firstName}.`;
  }

  window.handleLogout = async function () {
    await logOut();
    window.location.href = "index.html";
  };
</script>
</body>
</html>
