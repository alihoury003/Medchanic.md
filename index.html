<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medchanic.md — Log in</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="mark">⚙</span>
      <span class="name">MEDCHANIC.MD</span>
    </div>
    <div class="auth-sub">Diagnostic reasoning, tuned daily.</div>

    <div class="form-banner" id="banner"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@school.edu" autocomplete="email">
      <div class="field-error" id="emailError"></div>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <div class="field-error" id="passwordError"></div>
    </div>

    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Log in</button>

    <div class="auth-foot" style="margin-top:14px;">
      <a href="forgot-password.html">Forgot password?</a>
    </div>
    <div class="auth-foot">
      No account? <a href="signup.html">Sign up free</a>
    </div>
  </div>
</div>

<script type="module">
  import { logIn, getCurrentUser } from "./auth.js";

  getCurrentUser().then(user => {
    if (user) window.location.href = "dashboard.html";
  });

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function showBanner(msg, type) {
    const el = document.getElementById("banner");
    el.textContent = msg;
    el.className = `form-banner show ${type}`;
  }

  function fieldError(inputId, errorId, msg) {
    document.getElementById(inputId).classList.add("invalid");
    const el = document.getElementById(errorId);
    el.textContent = msg;
    el.classList.add("show");
  }

  function clearErrors() {
    document.querySelectorAll(".field-error").forEach(e => e.classList.remove("show"));
    document.querySelectorAll(".field input").forEach(e => e.classList.remove("invalid"));
    const b = document.getElementById("banner");
    b.classList.remove("show", "error", "success");
    b.textContent = "";
  }

  window.handleLogin = async function () {
    clearErrors();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");

    let hasError = false;
    if (!EMAIL_RE.test(email)) { fieldError("email", "emailError", "Enter a valid email address."); hasError = true; }
    if (!password) { fieldError("password", "passwordError", "Enter your password."); hasError = true; }
    if (hasError) return;

    btn.disabled = true;
    btn.textContent = "Logging in…";

    try {
      await logIn(email, password);
      window.location.href = "dashboard.html";
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Log in";
      if (err.code === 401) {
        showBanner("Incorrect email or password. Try again.", "error");
      } else if (err.code === 404) {
        showBanner("No account found with that email. Try signing up instead.", "error");
      } else {
        showBanner("Something went wrong. Please try again.", "error");
      }
    }
  };

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") window.handleLogin();
  });
</script>
</body>
</html>
